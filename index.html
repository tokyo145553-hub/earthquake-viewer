<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>地震情報ログ</title>

<style>

:root{
  --bg:#020817;
  --card:#071427;
  --border:#1e3a5f;
  --neon:#38bdf8;
  --neon2:#0ea5e9;
  --text:#e0f2fe;
  --sub:#7dd3fc;
}

body{
  font-family:"Hiragino Sans","Segoe UI",sans-serif;

  background:
    radial-gradient(circle at top,
      rgba(56,189,248,0.18),
      transparent 35%),
    radial-gradient(circle at bottom right,
      rgba(14,165,233,0.15),
      transparent 30%),
    #020617;

  color:var(--text);

  margin:0;
  padding:20px;

  min-height:100vh;
}

#container{
  max-width:900px;
  margin:auto;
}

h1{
  font-size:30px;
  margin-bottom:20px;
  font-weight:700;

  color:#7dd3fc;

  text-shadow:
    0 0 10px rgba(56,189,248,0.8),
    0 0 25px rgba(14,165,233,0.5);
}

.card{

  background:
    linear-gradient(
      180deg,
      rgba(10,25,47,0.95),
      rgba(4,10,24,0.95)
    );

  border-radius:18px;

  padding:20px;

  margin-bottom:25px;

  border:1px solid rgba(56,189,248,0.3);

  box-shadow:
    0 0 15px rgba(56,189,248,0.15),
    0 0 40px rgba(14,165,233,0.08),
    inset 0 0 20px rgba(56,189,248,0.04);

  backdrop-filter:blur(8px);
}

textarea{

  width:100%;
  height:320px;

  background:
    linear-gradient(
      180deg,
      rgba(1,10,25,0.95),
      rgba(1,5,15,0.98)
    );

  color:#dbeafe;

  border:1px solid rgba(56,189,248,0.2);

  padding:12px;

  border-radius:12px;

  resize:none;

  font-size:15px;
  line-height:1.7;

  font-family:
    Consolas,
    Menlo,
    monospace;

  box-sizing:border-box;

  box-shadow:
    inset 0 0 15px rgba(56,189,248,0.05);
}

textarea:focus{

  outline:none;

  border-color:
    rgba(56,189,248,0.6);

  box-shadow:
    0 0 15px rgba(56,189,248,0.3),
    inset 0 0 15px rgba(56,189,248,0.05);
}

button{

  background:
    linear-gradient(
      180deg,
      #38bdf8,
      #0284c7
    );

  color:white;

  padding:9px 16px;

  border-radius:10px;

  border:none;

  cursor:pointer;

  font-weight:700;

  margin-right:10px;
  margin-bottom:8px;

  transition:
    transform .15s,
    box-shadow .15s,
    opacity .15s;

  box-shadow:
    0 0 12px rgba(56,189,248,0.4);
}

button:hover{

  transform:translateY(-1px);

  box-shadow:
    0 0 18px rgba(56,189,248,0.8),
    0 0 35px rgba(14,165,233,0.4);

  opacity:.95;
}

button:active{
  transform:scale(.97);
}

.title{

  font-size:20px;

  margin-bottom:12px;

  color:#7dd3fc;

  font-weight:700;
}

#status{
  font-size:12px;
  color:#93c5fd;
  margin-top:8px;
}

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#020617;
}

::-webkit-scrollbar-thumb{
  background:#0ea5e9;
  border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
  background:#38bdf8;
}

</style>
</head>

<body>

<div id="container">

<h1>地震情報（過去5回分）</h1>

<div class="card">

<button onclick="copyAll()">全件コピー</button>
<button onclick="manualRefresh()">今すぐ更新</button>
<button onclick="enableAutoCopy()">自動コピー</button>

<br>

<button onclick="setTsunami('auto')">自動</button>
<button onclick="setTsunami('none')">なし</button>
<button onclick="setTsunami('forecast')">予報</button>
<button onclick="setTsunami('advisory')">注意報</button>
<button onclick="setTsunami('warning')">警報</button>
<button onclick="setTsunami('major')">大津波警報</button>

<div id="status">更新待機中...</div>

</div>

<div id="logs"></div>

</div>

<script>

// ===============================
// グローバル
// ===============================
let AUTO_COPY = false;
let lastHash = "";

let tsunamiMode = "auto";
let tsunamiText = "取得中...";
let tsunamiTimer = 0;

let ws;

let quakeBuffer = [];
let latestIds = new Set();

// ===============================
// ステータス更新
// ===============================
function updateStatusOnly(){

  document.getElementById("status").innerText =
    "最終更新: " +
    formatTimeOneLine(new Date());

}

// ===============================
// 津波情報
// ===============================
async function fetchTsunami(){

  try{

    const res =
      await fetch(
        "https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml"
      );

    const xmlText =
      await res.text();

    const parser =
      new DOMParser();

    const xml =
      parser.parseFromString(
        xmlText,
        "text/xml"
      );

    const entries =
      xml.getElementsByTagName("entry");

    if(!entries || entries.length === 0){

      tsunamiText =
        "津波情報取得失敗";

      return;
    }

    const latestTitle =
      entries[0]
      .getElementsByTagName("title")[0]
      ?.textContent || "";

    if(
      latestTitle.includes("津波") &&
      latestTitle.includes("解除")
    ){

      tsunamiText =
        "現在、津波に関する情報は発表されていません";

      return;
    }

    const priority = [
      "大津波警報",
      "津波警報",
      "津波注意報",
      "津波予報"
    ];

    let found = null;

    for(const p of priority){

      for(let i=0;i<entries.length;i++){

        const title =
          entries[i]
          .getElementsByTagName("title")[0]
          ?.textContent || "";

        const summary =
          entries[i]
          .getElementsByTagName("summary")[0]
          ?.textContent || "";

        if((title + summary).includes(p)){

          found = p;
          break;

        }
      }

      if(found) break;
    }

    if(found === "大津波警報"){

      tsunamiText =
        "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";

    }
    else if(found === "津波警報"){

      tsunamiText =
        "〈⚠ 津波警報〉\n現在津波警報を発表中です";

    }
    else if(found === "津波注意報"){

      tsunamiText =
        "〈津波注意報〉\n現在津波注意報を発表中です";

    }
    else if(found === "津波予報"){

      tsunamiText =
        "〈津波予報〉\n現在津波予報を発表中です";

    }
    else{

      tsunamiText =
        "現在、津波に関する情報は発表されていません";

    }

  }catch(e){

    tsunamiText =
      "津波情報取得失敗";

  }
}

function setTsunami(mode){

  tsunamiMode = mode;

}

function getTsunamiDisplay(){

  if(tsunamiMode === "none"){

    return "現在、津波に関する情報は発表されていません";

  }

  if(tsunamiMode === "forecast"){

    return "〈津波予報〉\n現在津波予報を発表中です";

  }

  if(tsunamiMode === "advisory"){

    return "〈津波注意報〉\n現在津波注意報を発表中です";

  }

  if(tsunamiMode === "warning"){

    return "〈⚠ 津波警報〉\n現在津波警報を発表中です";

  }

  if(tsunamiMode === "major"){

    return "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";

  }

  return tsunamiText;
}

// ===============================
// 地震ID
// ===============================
function makeQuakeId(q){

  const eq =
    q.earthquake || {};

  const h =
    eq.hypocenter || {};

  return [

    eq.time || "",
    h.name || "",
    h.magnitude || "",
    h.depth || ""

  ].join("_");
}

// ===============================
// 地震追加
// ===============================
function addQuake(q){

  try{

    const id =
      makeQuakeId(q);

    if(latestIds.has(id)){

      return false;

    }

    latestIds.add(id);

    quakeBuffer.unshift(q);

    quakeBuffer =
      quakeBuffer.slice(0,5);

    latestIds =
      new Set(
        quakeBuffer.map(v => makeQuakeId(v))
      );

    renderLogs();

    return true;

  }catch(e){

    console.error(e);

    return false;
  }
}

// ===============================
// WebSocket
// ===============================
function connectWSP2P(){

  ws =
    new WebSocket(
      "wss://api.p2pquake.net/v2/ws"
    );

  ws.onopen = () => {

    console.log("WS接続成功");

  };

  ws.onmessage = (event) => {

    try{

      const data =
        JSON.parse(event.data);

      if(data.code === 551){

        console.log("WS受信");

        addQuake(data);

      }

    }catch(e){

      console.error(
        "WS parse error",
        e
      );

    }
  };

  ws.onclose = () => {

    console.warn("WS切断");

    setTimeout(
      connectWSP2P,
      3000
    );

  };

  ws.onerror = () => {

    console.warn("WS error");

    ws.close();

  };
}

connectWSP2P();

// ===============================
// REST同期
// ===============================
async function fallbackREST(){

  updateStatusOnly();

  try{

    const res =
      await fetch(
        "https://api.p2pquake.net/v2/history?codes=551&limit=5"
      );

    const data =
      await res.json();

    let updated = false;

    data.reverse().forEach(q => {

      const added =
        addQuake(q);

      if(added){

        updated = true;

      }

    });

    if(!updated){

      updateStatusOnly();

    }

  }catch(e){

    console.error(
      "REST error",
      e
    );

  }
}

fallbackREST();

setInterval(
  fallbackREST,
  1000
);

// ===============================
// 時刻
// ===============================
function formatTimeBlock(label, date){

  const d =
    new Date(date);

  return (
    "■ " + label + "\n　" +
    d.getFullYear() + "年" +
    (d.getMonth()+1) + "月" +
    d.getDate() + "日 " +
    d.getHours() + "時" +
    String(d.getMinutes())
      .padStart(2,"0") +
    "分"
  );
}

function formatTimeOneLine(date){

  const d =
    new Date(date);

  return (
    d.getFullYear() + "年" +
    (d.getMonth()+1) + "月" +
    d.getDate() + "日 " +
    d.getHours() + "時" +
    String(d.getMinutes())
      .padStart(2,"0") +
    "分" +
    String(d.getSeconds())
      .padStart(2,"0") +
    "秒"
  );
}

// ===============================
// 震度処理
// ===============================
function normalizeCityName(raw){

  if (!raw) return "不明";

  raw =
    raw.replace(
      /[０-９Ａ-Ｚａ-ｚ]/g,
      s => String.fromCharCode(
        s.charCodeAt(0) - 65248
      )
    );

  raw = raw.replace(/\s+/g, "");
  raw = raw.replace(/（.*?）/g, "");
  raw = raw.replace(/[-ー－]+$/g, "");

  const specialCities = [

    "田村市","市川市","市原市",
    "野々市市","四日市市","町田市",
    "十日町市","大町市","山村市",
    "村山市","東村山市","武蔵村山市",
    "羽村市","大村市","余市町",
    "市貝町","上市町","市川三郷町",
    "市川町","下市町","大町町",
    "村田町","玉村町","中村区"

  ];

  if(specialCities.includes(raw)){

    return raw;

  }

  const posCity =
    raw.indexOf("市");

  if(posCity > 0){

    return raw.substring(0, posCity + 1);

  }

  const chars = [
    "区",
    "町",
    "村"
  ];

  let cutPos = -1;

  for(const c of chars){

    const pos =
      raw.indexOf(c);

    if(
      pos > 0 &&
      (cutPos === -1 || pos < cutPos)
    ){

      cutPos = pos;

    }
  }

  if(cutPos > 0){

    return raw.substring(0, cutPos + 1);

  }

  return raw;
}

function normalizePref(pref){

  if(!pref) return "不明";

  pref =
    pref.replace(/\s+/g,"");

  if(pref==="東京") return "東京都";
  if(pref==="大阪") return "大阪府";
  if(pref==="京都") return "京都府";

  if(!/都|道|府|県$/.test(pref)){

    return pref + "県";

  }

  return pref;
}

function buildIntensity(points){

  try{

    const cityMax = {};

    points.forEach(p => {

      // 修正
      if(!p) return;

      const pref =
        normalizePref(
          p.pref ||
          p.area ||
          "不明"
        );

      const city =
        normalizeCityName(
          p.city ||
          p.addr ||
          p.station ||
          p.area ||
          "不明"
        );

      // 修正
      const scale =
        Number(p.scale || 0);

      const key =
        pref + ":" + city;

      if(
        !cityMax[key] ||
        cityMax[key] < scale
      ){

        cityMax[key] = scale;

      }
    });

    const grouped = {};

    Object.entries(cityMax)
    .forEach(([key, scale]) => {

      const [pref, city] =
        key.split(":");

      if(!grouped[scale]){

        grouped[scale] = {};

      }

      if(!grouped[scale][pref]){

        grouped[scale][pref] = [];

      }

      grouped[scale][pref]
      .push(city);

    });

    const ORDER = [
      70,60,55,50,45,
      40,30,20,10
    ];

    const scaleMap = {
      10:"1",
      20:"2",
      30:"3",
      40:"4",
      45:"5弱",
      50:"5強",
      55:"6弱",
      60:"6強",
      70:"7"
    };

    let out = "";

    ORDER.forEach(s => {

      if(!grouped[s]) return;

      out +=
        "【震度" +
        scaleMap[s] +
        "】\n";

      out +=
        "━━━━━━━━━━━\n";

      Object.keys(grouped[s])
      .sort()
      .forEach(pref => {

        const cities =
          [...new Set(grouped[s][pref])];

        out +=
          "■ " + pref + "\n";

        out +=
          "  ・" +
          cities.join("、") +
          "\n\n";

      });
    });

    return out.trimEnd() || "震度情報なし";

  }catch(e){

    console.error(
      "Intensity error",
      e
    );

    return "震度情報解析失敗";
  }
}

// ===============================
// メイン描画
// ===============================
async function renderLogs(){

  try{

  updateStatusOnly();

  if(
    Date.now() - tsunamiTimer >
    10000
  ){

    await fetchTsunami();

    tsunamiTimer =
      Date.now();

  }

  let html = "";
  let allText = "";
  let latestText = "";

  for(let i=0;i<quakeBuffer.length;i++){

    const q =
      quakeBuffer[i];

    const eq =
      q.earthquake || {};

    const h =
      eq.hypocenter || {};

    let depth = "不明";

    if(h.depth === 0){

      depth = "ごく浅い";

    }
    else if(h.depth != null){

      depth =
        h.depth + "km";

    }

    // 修正
    const maxRaw =
      (q.points || []).reduce(
        (m,p)=>
          Math.max(
            m,
            Number(p?.scale || 0)
          ),
        0
      );

    const scaleMap = {
      10:"1",
      20:"2",
      30:"3",
      40:"4",
      45:"5弱",
      50:"5強",
      55:"6弱",
      60:"6強",
      70:"7"
    };

    const intensity =
      buildIntensity(
        q.points || []
      );

    let magStr = "---";

    if(typeof h.magnitude === "number"){

      magStr =
        h.magnitude.toFixed(1);

    }

    const text =

"【地震情報】\n\n"+

"■ 最大震度："+(scaleMap[maxRaw]||"---")+"\n"+

"■ マグニチュード：M"+magStr+"\n"+

"■ 震源地："+(h.name||"不明")+"\n"+

"■ 深さ："+depth+"\n"+

formatTimeBlock(
  "発生時刻",
  eq.time
)+"\n"+

formatTimeBlock(
  "配信時刻",
  new Date()
)+"\n\n"+

"■ 津波情報\n"+

getTsunamiDisplay()+"\n\n"+

"■ 出典\n"+
"・P2P地震情報API\n"+
"・気象庁\n"+

"--------------------\n"+

"■ 各地の震度\n"+

"--------------------\n\n"+

intensity;

    if(i===0){

      latestText = text;

    }

    html +=

      "<div class='card'>" +

      "<div class='title'>" +

      (i+1) +

      "件目の地震</div>" +

      "<button onclick='copyOne(this)'>" +

      "コピー" +

      "</button>" +

      "<textarea readonly>" +

      text +

      "</textarea>" +

      "</div>";

    allText += text + "\n";
  }

  window.ALL_LOGS =
    allText.trimEnd();

  document.getElementById("logs")
  .innerHTML = html;

  if(
    AUTO_COPY &&
    latestText !== lastHash
  ){

    lastHash = latestText;

    navigator.clipboard
    .writeText(latestText);

  }

  }catch(e){

    console.error(
      "render error",
      e
    );

  }
}

// ===============================
// コピー
// ===============================
function copyOne(btn){

  navigator.clipboard.writeText(

    btn.parentElement
    .querySelector("textarea")
    .value

  );
}

function copyAll(){

  navigator.clipboard.writeText(
    window.ALL_LOGS || ""
  );
}

function enableAutoCopy(){

  AUTO_COPY = true;

}

function manualRefresh(){

  renderLogs();

}

</script>

</body>
</html>
