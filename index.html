<script>

// ===============================
// グローバル
// ===============================
let AUTO_COPY = false;
let lastHash = "";

let tsunamiMode = "auto";
let tsunamiText = "取得中...";
let tsunamiTimer = 0;

let ws;

let quakeBuffer = [];
let quakeMap = new Map();

let rendering = false;

// ===============================
// ステータス更新
// ===============================
function updateStatusOnly(){

  document.getElementById("status").innerText =
    "最終更新: " +
    formatTimeOneLine(new Date());

}

// ===============================
// 津波情報
// ===============================
async function fetchTsunami(){

  try{

    const res =
      await fetch(
        "https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml"
      );

    const xmlText =
      await res.text();

    const parser =
      new DOMParser();

    const xml =
      parser.parseFromString(
        xmlText,
        "text/xml"
      );

    const entries =
      xml.getElementsByTagName("entry");

    if(!entries || entries.length === 0){

      tsunamiText =
        "津波情報取得失敗";

      return;
    }

    const latestTitle =
      entries[0]
      .getElementsByTagName("title")[0]
      ?.textContent || "";

    if(
      latestTitle.includes("津波") &&
      latestTitle.includes("解除")
    ){

      tsunamiText =
        "現在、津波に関する情報は発表されていません";

      return;
    }

    const priority = [
      "大津波警報",
      "津波警報",
      "津波注意報",
      "津波予報"
    ];

    let found = null;

    for(const p of priority){

      for(let i=0;i<entries.length;i++){

        const title =
          entries[i]
          .getElementsByTagName("title")[0]
          ?.textContent || "";

        const summary =
          entries[i]
          .getElementsByTagName("summary")[0]
          ?.textContent || "";

        if((title + summary).includes(p)){

          found = p;
          break;

        }
      }

      if(found) break;
    }

    if(found === "大津波警報"){

      tsunamiText =
        "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";

    }
    else if(found === "津波警報"){

      tsunamiText =
        "〈⚠ 津波警報〉\n現在津波警報を発表中です";

    }
    else if(found === "津波注意報"){

      tsunamiText =
        "〈津波注意報〉\n現在津波注意報を発表中です";

    }
    else if(found === "津波予報"){

      tsunamiText =
        "〈津波予報〉\n現在津波予報を発表中です";

    }
    else{

      tsunamiText =
        "現在、津波に関する情報は発表されていません";

    }

  }catch(e){

    tsunamiText =
      "津波情報取得失敗";

  }
}

function setTsunami(mode){

  tsunamiMode = mode;

}

function getTsunamiDisplay(){

  if(tsunamiMode === "none"){

    return "現在、津波に関する情報は発表されていません";

  }

  if(tsunamiMode === "forecast"){

    return "〈津波予報〉\n現在津波予報を発表中です";

  }

  if(tsunamiMode === "advisory"){

    return "〈津波注意報〉\n現在津波注意報を発表中です";

  }

  if(tsunamiMode === "warning"){

    return "〈⚠ 津波警報〉\n現在津波警報を発表中です";

  }

  if(tsunamiMode === "major"){

    return "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";

  }

  return tsunamiText;
}

// ===============================
// 地震ID
// ===============================
function makeQuakeId(q){

  return (
    q.id ||
    q.earthquake?.time ||
    Date.now().toString()
  );

}

// ===============================
// 地震追加
// ===============================
function addQuake(q){

  const id =
    makeQuakeId(q);

  const old =
    quakeMap.get(id);

  const newPoints =
    (q.points || []).length;

  const oldPoints =
    (old?.points || []).length;

  const newMax =
    (q.points || []).reduce(
      (m,p)=>Math.max(m,p.scale||0),
      0
    );

  const oldMax =
    (old?.points || []).reduce(
      (m,p)=>Math.max(m,p.scale||0),
      0
    );

  if(!old){

    quakeMap.set(id,q);

  }else{

    const shouldUpdate =

      newPoints > oldPoints ||
      newMax > oldMax ||
      JSON.stringify(q).length >
      JSON.stringify(old).length;

    if(shouldUpdate){

      quakeMap.set(id,q);

    }else{

      return false;

    }
  }

  quakeBuffer =
    [...quakeMap.values()]
    .sort((a,b)=>{

      return new Date(
        b.earthquake?.time || 0
      ) - new Date(
        a.earthquake?.time || 0
      );

    })
    .slice(0,5);

  renderLogs();

  return true;
}

// ===============================
// WebSocket
// ===============================
function connectWSP2P(){

  ws =
    new WebSocket(
      "wss://api.p2pquake.net/v2/ws"
    );

  ws.onopen = () => {

    console.log("WS接続成功");

  };

  ws.onmessage = (event) => {

    try{

      const data =
        JSON.parse(event.data);

      if(data.code === 551){

        console.log("WS受信");

        addQuake(data);

      }

    }catch(e){

      console.error(
        "WS parse error",
        e
      );

    }
  };

  ws.onclose = () => {

    console.warn("WS切断");

    setTimeout(
      connectWSP2P,
      3000
    );

  };

  ws.onerror = () => {

    console.warn("WS error");

    ws.close();

  };
}

connectWSP2P();

// ===============================
// REST同期
// ===============================
async function fallbackREST(){

  updateStatusOnly();

  try{

    const res =
      await fetch(
        "https://api.p2pquake.net/v2/history?codes=551&limit=5"
      );

    const data =
      await res.json();

    data.forEach(q => {

      addQuake(q);

    });

  }catch(e){

    console.error(
      "REST error",
      e
    );

  }
}

fallbackREST();

setInterval(
  fallbackREST,
  3000
);

// ===============================
// 時刻
// ===============================
function formatTimeBlock(label, date){

  const d =
    new Date(date);

  return (
    "■ " + label + "\n　" +
    d.getFullYear() + "年" +
    (d.getMonth()+1) + "月" +
    d.getDate() + "日 " +
    d.getHours() + "時" +
    String(d.getMinutes())
      .padStart(2,"0") +
    "分"
  );
}

function formatTimeOneLine(date){

  const d =
    new Date(date);

  return (
    d.getFullYear() + "年" +
    (d.getMonth()+1) + "月" +
    d.getDate() + "日 " +
    d.getHours() + "時" +
    String(d.getMinutes())
      .padStart(2,"0") +
    "分" +
    String(d.getSeconds())
      .padStart(2,"0") +
    "秒"
  );
}

// ===============================
// 震度処理
// ===============================
function normalizeCityName(raw){

  if (!raw) return "不明";

  raw =
    raw.replace(
      /[０-９Ａ-Ｚａ-ｚ]/g,
      s => String.fromCharCode(
        s.charCodeAt(0) - 65248
      )
    );

  raw = raw.replace(/\s+/g, "");
  raw = raw.replace(/（.*?）/g, "");
  raw = raw.replace(/[-ー－]+$/g, "");

  const specialCities = [

    "田村市","市川市","市原市",
    "野々市市","四日市市","町田市",
    "十日町市","大町市","山村市",
    "村山市","東村山市","武蔵村山市",
    "羽村市","大村市","余市町",
    "市貝町","上市町","市川三郷町",
    "市川町","下市町","大町町",
    "村田町","玉村町","中村区"

  ];

  if(specialCities.includes(raw)){

    return raw;

  }

  const posCity =
    raw.indexOf("市");

  if(posCity > 0){

    return raw.substring(0, posCity + 1);

  }

  const chars = [
    "区",
    "町",
    "村"
  ];

  let cutPos = -1;

  for(const c of chars){

    const pos =
      raw.indexOf(c);

    if(
      pos > 0 &&
      (cutPos === -1 || pos < cutPos)
    ){

      cutPos = pos;

    }
  }

  if(cutPos > 0){

    return raw.substring(0, cutPos + 1);

  }

  return raw;
}

function normalizePref(pref){

  if(!pref) return "不明";

  pref =
    pref.replace(/\s+/g,"");

  if(pref==="東京") return "東京都";
  if(pref==="大阪") return "大阪府";
  if(pref==="京都") return "京都府";

  if(!/都|道|府|県$/.test(pref)){

    return pref + "県";

  }

  return pref;
}

function buildIntensity(points){

  if(
    !points ||
    points.length === 0
  ){
    return "";
  }

  const cityMax = {};

  points.forEach(p => {

    const pref =
      normalizePref(
        p.pref ||
        p.area ||
        "不明"
      );

    const city =
      normalizeCityName(
        p.city ||
        p.addr ||
        p.station ||
        p.area ||
        "不明"
      );

    const scale =
      p.scale;

    const key =
      pref + ":" + city;

    if(
      !cityMax[key] ||
      cityMax[key] < scale
    ){

      cityMax[key] = scale;

    }
  });

  const grouped = {};

  Object.entries(cityMax)
  .forEach(([key, scale]) => {

    const [pref, city] =
      key.split(":");

    if(!grouped[scale]){

      grouped[scale] = {};

    }

    if(!grouped[scale][pref]){

      grouped[scale][pref] = [];

    }

    grouped[scale][pref]
    .push(city);

  });

  const ORDER = [
    70,60,55,50,45,
    40,30,20,10
  ];

  const scaleMap = {
    10:"1",
    20:"2",
    30:"3",
    40:"4",
    45:"5弱",
    50:"5強",
    55:"6弱",
    60:"6強",
    70:"7"
  };

  let out = "";

  ORDER.forEach(s => {

    if(!grouped[s]) return;

    out +=
      "【震度" +
      scaleMap[s] +
      "】\n";

    out +=
      "━━━━━━━━━━━\n";

    Object.keys(grouped[s])
    .sort()
    .forEach(pref => {

      const cities =
        [...new Set(grouped[s][pref])];

      out +=
        "■ " + pref + "\n";

      out +=
        "  ・" +
        cities.join("、") +
        "\n\n";

    });
  });

  return out.trimEnd();
}

// ===============================
// メイン描画
// ===============================
async function renderLogs(){

  if(rendering) return;

  rendering = true;

  try{

    updateStatusOnly();

    if(
      Date.now() - tsunamiTimer >
      10000
    ){

      await fetchTsunami();

      tsunamiTimer =
        Date.now();

    }

    let html = "";
    let allText = "";
    let latestText = "";

    for(let i=0;i<quakeBuffer.length;i++){

      const q =
        quakeBuffer[i];

      const eq =
        q.earthquake || {};

      const h =
        eq.hypocenter || {};

      const fallbackQuake =
        quakeBuffer.find(v => {

          if(v === q) return false;

          return (
            v.earthquake?.time === eq.time &&
            (v.points || []).length > 0
          );

        });

      let usedPoints =
        q.points || [];

      if(
        usedPoints.length === 0 &&
        fallbackQuake
      ){

        usedPoints =
          fallbackQuake.points || [];

      }

      let depth = "不明";

      if(h.depth === 0){

        depth = "ごく浅い";

      }
      else if(h.depth != null){

        depth =
          h.depth + "km";

      }

      const maxRaw =
        usedPoints.reduce(
          (m,p)=>
            Math.max(
              m,
              p.scale || 0
            ),
          0
        );

      const scaleMap = {
        10:"1",
        20:"2",
        30:"3",
        40:"4",
        45:"5弱",
        50:"5強",
        55:"6弱",
        60:"6強",
        70:"7"
      };

      const intensity =
        buildIntensity(
          usedPoints
        );

      let magStr = "---";

      if(typeof h.magnitude === "number"){

        magStr =
          h.magnitude.toFixed(1);

      }

      const isShindoOnly =
        !h.name ||
        h.name === "不明" ||
        h.magnitude == null ||
        h.magnitude < 0 ||
        h.depth == null ||
        h.depth < 0;

      let text = "";

      if(isShindoOnly){

        text =

`【震度速報】
${new Date(eq.time).getFullYear()}年${new Date(eq.time).getMonth()+1}月${new Date(eq.time).getDate()}日 ${new Date(eq.time).getHours()}時${String(new Date(eq.time).getMinutes()).padStart(2,"0")}分頃

${intensity}`;

      }else{

        text =

"【地震情報】\n\n"+

"■ 最大震度："+(scaleMap[maxRaw]||"---")+"\n"+

"■ マグニチュード：M"+magStr+"\n"+

"■ 震源地："+(h.name||"不明")+"\n"+

"■ 深さ："+depth+"\n\n"+

formatTimeBlock(
  "発生時刻",
  eq.time
)+"\n\n"+

formatTimeBlock(
  "配信時刻",
  new Date()
)+"\n\n"+

"■ 津波情報\n"+

getTsunamiDisplay()+"\n\n"+

"■ 出典\n"+
"・P2P地震情報API\n"+
"・気象庁"+

(
  intensity ?
  "\n\n--------------------\n"+
  "■ 各地の震度\n"+
  "--------------------\n\n"+
  intensity
  : ""
);

      }

      if(i===0){

        latestText = text;

      }

      html +=

        "<div class='card'>" +

        "<div class='title'>" +

        (i+1) +

        "件目の地震</div>" +

        "<button onclick='copyOne(this)'>" +

        "コピー" +

        "</button>" +

        "<textarea readonly>" +

        text +

        "</textarea>" +

        "</div>";

      allText += text + "\n";
    }

    window.ALL_LOGS =
      allText.trimEnd();

    document.getElementById("logs")
    .innerHTML = html;

    if(
      AUTO_COPY &&
      latestText !== lastHash
    ){

      lastHash = latestText;

      navigator.clipboard
      .writeText(latestText);

    }

  }finally{

    rendering = false;

  }
}

// ===============================
// コピー
// ===============================
function copyOne(btn){

  navigator.clipboard.writeText(

    btn.parentElement
    .querySelector("textarea")
    .value

  );
}

function copyAll(){

  navigator.clipboard.writeText(
    window.ALL_LOGS || ""
  );
}

function enableAutoCopy(){

  AUTO_COPY = true;

}

function manualRefresh(){

  renderLogs();

}

</script>
