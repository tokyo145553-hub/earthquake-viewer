async function fetchTsunami(){

    const res =
      await fetch(
        "https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml"
      );

    const xmlText =
      await res.text();

    const parser =
      new DOMParser();

    const xml =
      parser.parseFromString(
        xmlText,
        "text/xml"
      );

    const entries =
      xml.getElementsByTagName("entry");

    if(!entries || entries.length === 0){

      tsunamiText =
        "жҙҘжіўжғ…е ұеҸ–еҫ—еӨұж•—";

      return;
    }

    const latestTitle =
      entries[0]
      .getElementsByTagName("title")[0]
      ?.textContent || "";

    if(
      latestTitle.includes("жҙҘжіў") &&
      latestTitle.includes("и§ЈйҷӨ")
    ){

      tsunamiText =
        "зҸҫеңЁгҖҒжҙҘжіўгҒ«й–ўгҒҷгӮӢжғ…е ұгҒҜзҷәиЎЁгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“";

      return;
    }

    const priority = [
      "еӨ§жҙҘжіўиӯҰе ұ",
      "жҙҘжіўиӯҰе ұ",
      "жҙҘжіўжіЁж„Ҹе ұ",
      "жҙҘжіўдәҲе ұ"
    ];

    let found = null;

    for(const p of priority){

      for(let i=0;i<entries.length;i++){

        const title =
          entries[i]
          .getElementsByTagName("title")[0]
          ?.textContent || "";

        const summary =
          entries[i]
          .getElementsByTagName("summary")[0]
          ?.textContent || "";

        if((title + summary).includes(p)){

          found = p;
          break;

        }
      }

      if(found) break;
    }

    if(found === "еӨ§жҙҘжіўиӯҰе ұ"){

      tsunamiText =
        "гҖҲвҡ  еӨ§жҙҘжіўиӯҰе ұгҖү\\nзҸҫеңЁеӨ§жҙҘжіўиӯҰе ұгӮ’зҷәиЎЁдёӯгҒ§гҒҷ";

function formatTimeBlock(label, date){

  const d =
    new Date(date);

  return (
    "в–  " + label + "\\nгҖҖ" +
    d.getFullYear() + "е№ҙ" +
    (d.getMonth()+1) + "жңҲ" +
    d.getDate() + "ж—Ҙ " +
    d.getHours() + "жҷӮ" +
    String(d.getMinutes())
      .padStart(2,"0") +
    "еҲҶ"
  );
}

function formatTimeOneLine(date){

  const d =
    new Date(date);

  return (
    d.getFullYear()+"е№ҙ"+
    (d.getMonth()+1)+"жңҲ"+
    d.getDate()+"ж—Ҙ "+
    d.getHours()+"жҷӮ"+
    String(d.getMinutes())
    .padStart(2,"0")+"еҲҶ"+
    String(d.getSeconds())
    .padStart(2,"0")+"з§’"
  );
}

function normalizeCityName(raw){

  if (!raw) return "дёҚжҳҺ";

  raw =
    raw.replace(
      /[пјҗ-пјҷпјЎ-пјәпҪҒ-пҪҡ]/g,
      s => String.fromCharCode(
        s.charCodeAt(0) - 65248
      )
    );

  raw = raw.replace(/\\s+/g, "");
  raw = raw.replace(/пјҲ.*?пјү/g, "");
  raw = raw.replace(/[-гғјпјҚ]+$/g, "");

  const specialCities = [
    "з”°жқ‘еёӮ","еёӮе·қеёӮ","еёӮеҺҹеёӮ",
    "йҮҺгҖ…еёӮеёӮ","еӣӣж—ҘеёӮеёӮ","з”әз”°еёӮ",
    "еҚҒж—Ҙз”әеёӮ","еӨ§з”әеёӮ","еұұжқ‘еёӮ",
    "жқ‘еұұеёӮ","жқұжқ‘еұұеёӮ","жӯҰи”өжқ‘еұұеёӮ",
    "зҫҪжқ‘еёӮ","еӨ§жқ‘еёӮ","дҪҷеёӮз”ә",
    "еёӮиІқз”ә","дёҠеёӮз”ә","еёӮе·қдёүйғ·з”ә",
    "еёӮе·қз”ә","дёӢеёӮз”ә","еӨ§з”әз”ә",
    "жқ‘з”°з”ә","зҺүжқ‘з”ә","дёӯжқ‘еҢә"
  ];

  if (specialCities.includes(raw)) return raw;

  const posCity = raw.indexOf("еёӮ");

  if (posCity > 0){

    return raw.substring(0, posCity + 1);

  }

  const chars = ["еҢә","з”ә","жқ‘"];

  let cutPos = -1;

  for (const c of chars) {

    const pos = raw.indexOf(c);

    if (
      pos > 0 &&
      (cutPos === -1 || pos < cutPos)
    ){

      cutPos = pos;

    }
  }

  if (cutPos > 0){

    return raw.substring(0, cutPos + 1);

  }

  return raw;
}

function normalizePref(pref){

  if(!pref)return"дёҚжҳҺ";

  pref=pref.replace(/\\s+/g,"");

  if(pref==="жқұдә¬")return"жқұдә¬йғҪ";
  if(pref==="еӨ§йҳӘ")return"еӨ§йҳӘеәң";
  if(pref==="дә¬йғҪ")return"дә¬йғҪеәң";

  if(!/йғҪ|йҒ“|еәң|зңҢ$/.test(pref)){

    return pref+"зңҢ";

  }

  return pref;
}

// ===============================
// йңҮеәҰ
// ===============================
function buildIntensity(points){

  try{

    const cityMax = {};

    points.forEach(p => {

      if(!p) return;

      const pref =
        normalizePref(
          p.pref ||
          p.area ||
          "дёҚжҳҺ"
        );

      const city =
        normalizeCityName(
          p.city ||
          p.addr ||
          p.station ||
          p.area ||
          "дёҚжҳҺ"
        );

      const scale =
        Number(p.scale || 0);

      const key =
        pref + ":" + city;

      if (
        !cityMax[key] ||
        cityMax[key] < scale
      ){

        cityMax[key] = scale;

      }
    });

    const grouped = {};

    Object.entries(cityMax)
    .forEach(([key, scale]) => {

      const [pref, city] =
        key.split(":");

      if (!grouped[scale]){

        grouped[scale] = {};

      }

      if (!grouped[scale][pref]){

        grouped[scale][pref] = [];

      }

      grouped[scale][pref]
      .push(city);

    });

    const ORDER = [
      70,60,55,50,45,
      40,30,20,10
    ];

    const scaleMap = {
      10:"1",
      20:"2",
      30:"3",
      40:"4",
      45:"5ејұ",
      50:"5еј·",
      55:"6ејұ",
      60:"6еј·",
      70:"7"
    };

    let out = "";

    ORDER.forEach(s => {

      if (!grouped[s]) return;

      out +=
        "гҖҗйңҮеәҰ" +
        scaleMap[s] +
        "гҖ‘\\n";

      out +=
        "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\\n";

      Object.keys(grouped[s])
      .sort()
      .forEach(pref => {

        const cities =
          [...new Set(grouped[s][pref])];

        out +=
          "в–  " + pref + "\\n";

        out +=
          "  гғ»" +
          cities.join("гҖҒ") +
          "\\n\\n";

      });
    });

    return out.trimEnd() || "йңҮеәҰжғ…е ұгҒӘгҒ—";

  }catch(e){

    console.error(
      "Intensity error",
      e
    );

    return "йңҮеәҰжғ…е ұи§ЈжһҗеӨұж•—";
  }
}

// ===============================
// ең°йңҮID
// ===============================
function makeQuakeId(q){

  const eq =
    q.earthquake || {};

  const h =
    eq.hypocenter || {};

  return [
    eq.time || "",
    h.name || "",
    h.magnitude || "",
    h.depth || ""
  ].join("_");
}

// ===============================
// ең°йңҮиҝҪеҠ 
// ===============================
function addQuake(q){

  try{

    const id =
      makeQuakeId(q);

    if(latestIds.has(id)){

      return false;

    }

    latestIds.add(id);

    quakeBuffer.unshift(q);

    quakeBuffer =
      quakeBuffer.slice(0,5);

    latestIds =
      new Set(
        quakeBuffer.map(v => makeQuakeId(v))
      );

    renderLogs();

    return true;

  }catch(e){

    console.error(e);

    return false;
  }
}

async function renderLogs(){

        quakeBuffer[i];

      const eq =
        q.earthquake || {};

      const h =
        eq.hypocenter || {};

      if(h.depth===0){

        depth="гҒ”гҒҸжө…гҒ„";

      }
      else if(h.depth!=null){

        depth=h.depth+"km";

      }

      const maxRaw =
        (q.points || []).reduce(
          (m,p)=>
            Math.max(
              m,
              Number(p?.scale || 0)
            ),
          0
        );

      const scaleMap = {
        10:"1",
        20:"2",
        30:"3",
        40:"4",
        45:"5ејұ",
        50:"5еј·",
        55:"6ејұ",
        60:"6еј·",
        70:"7"
      };

      const intensity =
        buildIntensity(
          q.points || []
        );

      let magStr =
        (typeof h.magnitude==="number")
        ? h.magnitude.toFixed(1)
        : "---";

      const text =

"гҖҗең°йңҮжғ…е ұгҖ‘\\n\\n"+

"в–  жңҖеӨ§йңҮеәҰпјҡ"+(scaleMap[maxRaw]||"---")+"\\n"+

"в–  гғһгӮ°гғӢгғҒгғҘгғјгғүпјҡM"+magStr+"\\n"+

"в–  йңҮжәҗең°пјҡ"+(h.name||"дёҚжҳҺ")+"\\n"+

"в–  ж·ұгҒ•пјҡ"+depth+"\\n"+

formatTimeBlock(
  "зҷәз”ҹжҷӮеҲ»",
  eq.time
)+"\\n"+

formatTimeBlock(
  "й…ҚдҝЎжҷӮеҲ»",
  new Date()
)+"\\n\\n"+

"в–  жҙҘжіўжғ…е ұ\\n"+

getTsunamiDisplay()+"\\n\\n"+

"в–  еҮәе…ё\\n"+
"гғ»P2Pең°йңҮжғ…е ұAPI\\n"+
"гғ»ж°—иұЎеәҒ\\n"+

"--------------------\\n"+

"в–  еҗ„ең°гҒ®йңҮеәҰ\\n"+

"--------------------\\n\\n"+

intensity;

      if(i===0){

        latestText=text;

      }

      html +=
      "<div class='card'>"+
      "<div class='title'>"+
      (i+1)+
      "д»¶зӣ®гҒ®ең°йңҮ</div>"+
      "<button onclick='copyOne(this)'>"+
      "гӮігғ”гғј"+
      "</button>"+
      "<textarea readonly>"+
      text+
      "</textarea>"+
      "</div>";

      allText += text + "\\n";
    }

    window.ALL_LOGS =
      allText.trimEnd();

    document.getElementById("logs")
      .innerHTML = html;

    if(
      AUTO_COPY &&
      latestText !== lastHash
    ){

      lastHash = latestText;

      navigator.clipboard
      .writeText(latestText);

    }

  }catch(e){

    console.error(
      "render error",
      e
    );

  }
}

function connectWSP2P(){

  ws =
    new WebSocket(
      "wss://api.p2pquake.net/v2/ws"
    );

  ws.onopen = () => {

    console.log("WSжҺҘз¶ҡжҲҗеҠҹ");

  };

  ws.onmessage = (event) => {

    try{

      const data =
        JSON.parse(event.data);

      if(data.code === 551){

        console.log("WSеҸ—дҝЎ");

        addQuake(data);

      }

    }catch(e){

      console.error(
        "WS parse error",
        e
      );

    }
  };

  ws.onclose = () => {

    console.warn("WSеҲҮж–ӯ");

    setTimeout(
      connectWSP2P,
      3000
    );

  };

  ws.onerror = () => {

    console.warn("WS error");

    ws.close();

  };
}

async function fallbackREST(){

  try{

    const res =
      await fetch(
        "https://api.p2pquake.net/v2/history?codes=551&limit=5"
      );

    const data =
      await res.json();

    data.reverse().forEach(q => {

      addQuake(q);

    });

  }catch(e){

    console.error(
      "REST error",
      e
    );

  }
}
