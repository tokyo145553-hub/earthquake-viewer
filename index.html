<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>地震情報ログ</title>

<style>

:root{
  --bg:#020817;
  --card:#071427;
  --border:#1e3a5f;
  --neon:#38bdf8;
  --neon2:#0ea5e9;
  --text:#e0f2fe;
  --sub:#7dd3fc;
}

body{
  font-family:"Hiragino Sans","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top,
      rgba(56,189,248,0.18),
      transparent 35%),
    radial-gradient(circle at bottom right,
      rgba(14,165,233,0.15),
      transparent 30%),
    #020617;
  color:var(--text);
  margin:0;
  padding:20px;
  min-height:100vh;
}

#container{
  max-width:900px;
  margin:auto;
}

h1{
  font-size:30px;
  margin-bottom:20px;
  font-weight:700;
  color:#7dd3fc;
  text-shadow:
    0 0 10px rgba(56,189,248,0.8),
    0 0 25px rgba(14,165,233,0.5);
}

.card{
  background:
    linear-gradient(
      180deg,
      rgba(10,25,47,0.95),
      rgba(4,10,24,0.95)
    );
  border-radius:18px;
  padding:20px;
  margin-bottom:25px;
  border:1px solid rgba(56,189,248,0.3);
  box-shadow:
    0 0 15px rgba(56,189,248,0.15),
    0 0 40px rgba(14,165,233,0.08),
    inset 0 0 20px rgba(56,189,248,0.04);
}

textarea{
  width:100%;
  height:320px;
  background:
    linear-gradient(
      180deg,
      rgba(1,10,25,0.95),
      rgba(1,5,15,0.98)
    );
  color:#dbeafe;
  border:1px solid rgba(56,189,248,0.2);
  padding:12px;
  border-radius:12px;
  resize:none;
  font-size:15px;
  line-height:1.7;
  font-family:Consolas,Menlo,monospace;
  box-sizing:border-box;
}

button{
  background:
    linear-gradient(
      180deg,
      #38bdf8,
      #0284c7
    );
  color:white;
  padding:9px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
  margin-right:10px;
  margin-bottom:8px;
}

.title{
  font-size:20px;
  margin-bottom:12px;
  color:#7dd3fc;
  font-weight:700;
}

#status{
  font-size:12px;
  color:#93c5fd;
  margin-top:8px;
}

</style>
</head>

<body>

<div id="container">

<h1>地震情報（過去5回分）</h1>

<div class="card">

<button onclick="copyAll()">全件コピー</button>
<button onclick="manualRefresh()">今すぐ更新</button>
<button onclick="enableAutoCopy()">自動コピー</button>

<div id="status">更新待機中...</div>

</div>

<div id="logs"></div>

</div>

<script>

// ===============================
// グローバル
// ===============================

let AUTO_COPY = false;
let lastHash = "";

let ws;

let quakeMap = new Map();
let quakeBuffer = [];

let rendering = false;

// ===============================
// 時刻
// ===============================

function formatTimeOneLine(date){

  const d = new Date(date);

  return (
    d.getFullYear()+"年"+
    (d.getMonth()+1)+"月"+
    d.getDate()+"日 "+
    d.getHours()+"時"+
    String(d.getMinutes()).padStart(2,"0")+"分"+
    String(d.getSeconds()).padStart(2,"0")+"秒"
  );
}

function formatTimeBlock(label,date){

  const d = new Date(date);

  return (
    "■ "+label+"\n　"+
    d.getFullYear()+"年"+
    (d.getMonth()+1)+"月"+
    d.getDate()+"日 "+
    d.getHours()+"時"+
    String(d.getMinutes()).padStart(2,"0")+"分"
  );
}

// ===============================
// ステータス
// ===============================

function updateStatusOnly(){

  document.getElementById("status").innerText =
    "最終更新: " +
    formatTimeOneLine(new Date());

}

// ===============================
// 津波
// ===============================

async function fetchTsunami(){

  try{

    const res =
      await fetch(
        "https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml"
      );

    const xmlText = await res.text();

    if(xmlText.includes("大津波警報")){

      return "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";

    }

    if(xmlText.includes("津波警報")){

      return "〈⚠ 津波警報〉\n現在津波警報を発表中です";

    }

    if(xmlText.includes("津波注意報")){

      return "〈津波注意報〉\n現在津波注意報を発表中です";

    }

    if(xmlText.includes("津波予報")){

      return "〈津波予報〉\n現在津波予報を発表中です";

    }

    return "現在、津波に関する情報は発表されていません";

  }catch(e){

    return "津波情報取得失敗";

  }
}

// ===============================
// ID
// ===============================

function makeQuakeId(q){

  return (
    q.id ||
    q.earthquake?.time ||
    Date.now().toString()
  );

}

// ===============================
// 震度
// ===============================

function buildIntensity(points){

  if(!points || points.length === 0){

    return "震度情報なし";

  }

  points = points.slice(0,300);

  const grouped = {};

  const scaleMap = {
    10:"1",
    20:"2",
    30:"3",
    40:"4",
    45:"5弱",
    50:"5強",
    55:"6弱",
    60:"6強",
    70:"7"
  };

  points.forEach(p=>{

    const scale =
      scaleMap[p.scale] || "?";

    if(!grouped[scale]){

      grouped[scale] = [];

    }

    grouped[scale].push(
      p.addr || p.city || p.pref || "不明"
    );

  });

  let out = "";

  Object.keys(grouped)
  .reverse()
  .forEach(scale=>{

    out +=
      "【震度"+scale+"】\n";

    out +=
      grouped[scale].join("、");

    out += "\n\n";

  });

  return out.trim();

}

// ===============================
// 地震追加
// ===============================

function addQuake(q){

  const id =
    makeQuakeId(q);

  const old =
    quakeMap.get(id);

  const newPoints =
    (q.points || []).length;

  const newMax =
    (q.points || []).reduce(
      (m,p)=>Math.max(m,p.scale||0),
      0
    );

  const oldPoints =
    (old?.points || []).length;

  const oldMax =
    (old?.points || []).reduce(
      (m,p)=>Math.max(m,p.scale||0),
      0
    );

  if(!old){

    quakeMap.set(id,q);

  }else{

    const shouldUpdate =

      newPoints > oldPoints ||
      newMax > oldMax ||
      JSON.stringify(q).length >
      JSON.stringify(old).length;

    if(shouldUpdate){

      quakeMap.set(id,q);

    }else{

      return false;

    }
  }

  quakeBuffer =
    [...quakeMap.values()]
    .sort((a,b)=>{

      return new Date(
        b.earthquake?.time || 0
      ) - new Date(
        a.earthquake?.time || 0
      );

    })
    .slice(0,5);

  renderLogs();

  return true;
}

// ===============================
// 描画
// ===============================

async function renderLogs(){

  if(rendering) return;

  rendering = true;

  try{

    updateStatusOnly();

    const tsunami =
      await fetchTsunami();

    let html = "";
    let allText = "";
    let latestText = "";

    for(let i=0;i<quakeBuffer.length;i++){

      const q =
        quakeBuffer[i];

      const eq =
        q.earthquake || {};

      const h =
        eq.hypocenter || {};

      const maxRaw =
        (q.points || []).reduce(
          (m,p)=>Math.max(m,p.scale||0),
          0
        );

      const scaleMap = {
        10:"1",
        20:"2",
        30:"3",
        40:"4",
        45:"5弱",
        50:"5強",
        55:"6弱",
        60:"6強",
        70:"7"
      };

      let depth = "不明";

      if(h.depth === 0){

        depth = "ごく浅い";

      }
      else if(h.depth != null){

        depth = h.depth + "km";

      }

      let mag = "---";

      if(typeof h.magnitude === "number"){

        mag =
          h.magnitude.toFixed(1);

      }

      const text =

`【地震情報】

■ 最大震度：${scaleMap[maxRaw] || "---"}
■ マグニチュード：M${mag}
■ 震源地：${h.name || "不明"}
■ 深さ：${depth}

${formatTimeBlock("発生時刻",eq.time)}

${formatTimeBlock("配信時刻",new Date())}

■ 津波情報
${tsunami}

■ 出典
・P2P地震情報API
・気象庁

--------------------
■ 各地の震度
--------------------

${buildIntensity(q.points || [])}`;

      if(i === 0){

        latestText = text;

      }

      html +=
        "<div class='card'>" +
        "<div class='title'>" +
        (i+1) +
        "件目の地震</div>" +
        "<button onclick='copyOne(this)'>コピー</button>" +
        "<textarea readonly>" +
        text +
        "</textarea>" +
        "</div>";

      allText += text + "\n\n";

    }

    window.ALL_LOGS =
      allText.trim();

    document.getElementById("logs")
    .innerHTML = html;

    if(
      AUTO_COPY &&
      latestText !== lastHash
    ){

      lastHash = latestText;

      navigator.clipboard
      .writeText(latestText);

    }

  }finally{

    rendering = false;

  }
}

// ===============================
// WS
// ===============================

function connectWSP2P(){

  ws =
    new WebSocket(
      "wss://api.p2pquake.net/v2/ws"
    );

  ws.onopen = ()=>{

    console.log("WS接続");

  };

  ws.onmessage = (event)=>{

    try{

      const data =
        JSON.parse(event.data);

      if(data.code === 551){

        addQuake(data);

      }

    }catch(e){

      console.error(e);

    }

  };

  ws.onclose = ()=>{

    setTimeout(
      connectWSP2P,
      3000
    );

  };

  ws.onerror = ()=>{

    ws.close();

  };
}

connectWSP2P();

// ===============================
// REST
// ===============================

async function fallbackREST(){

  updateStatusOnly();

  try{

    const res =
      await fetch(
        "https://api.p2pquake.net/v2/history?codes=551&limit=10"
      );

    const data =
      await res.json();

    data.forEach(q=>{

      addQuake(q);

    });

  }catch(e){

    console.error(e);

  }
}

fallbackREST();

setInterval(
  fallbackREST,
  3000
);

// ===============================
// コピー
// ===============================

function copyOne(btn){

  navigator.clipboard.writeText(

    btn.parentElement
    .querySelector("textarea")
    .value

  );

}

function copyAll(){

  navigator.clipboard.writeText(
    window.ALL_LOGS || ""
  );

}

function enableAutoCopy(){

  AUTO_COPY = true;

}

function manualRefresh(){

  renderLogs();

}

</script>

</body>
</html>
