<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>地震情報ログ</title>

<style>
body{
font-family:"Hiragino Sans","Segoe UI",sans-serif;
background:#000;
color:#fff;
margin:0;
padding:20px;
}

#container{max-width:900px;margin:auto;}

h1{
font-size:28px;
margin-bottom:20px;
font-weight:600;
}

.card{
background:#111;
border-radius:14px;
padding:20px;
margin-bottom:25px;
border:1px solid #333;
box-shadow:0 4px 20px rgba(255,255,255,0.05);
}

textarea{
width:100%;
height:300px;
background:#000;
color:#fff;
border:none;
padding:12px;
border-radius:8px;
resize:none;
font-size:15px;
line-height:1.7;
font-family:Consolas,Menlo,monospace;
}

button{
background:#fff;
color:#000;
padding:8px 16px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:600;
margin-right:10px;
margin-bottom:5px;
}

button:hover{background:#ccc;}

.title{
font-size:20px;
margin-bottom:10px;
}

#status{
font-size:12px;
color:#aaa;
margin-top:5px;
}
</style>
</head>

<body>

<div id="container">

<h1>地震情報（リアルタイム + 震度解析）</h1>

<div class="card">

<button onclick="enableAutoCopy()">自動コピー</button>
<button onclick="copyAll()">全件コピー</button>

<br>

<button onclick="setTsunami('auto')">自動</button>
<button onclick="setTsunami('none')">なし</button>
<button onclick="setTsunami('forecast')">予報</button>
<button onclick="setTsunami('advisory')">注意報</button>
<button onclick="setTsunami('warning')">警報</button>
<button onclick="setTsunami('major')">大津波警報</button>

<div id="status">WebSocket待機中...</div>

</div>

<div id="logs"></div>

</div>

<script>

// =========================
// 状態
// =========================
let AUTO_COPY = false;
let lastHash = "";

let tsunamiMode = "auto";
let tsunamiText = "取得中...";
let tsunamiTimer = 0;

// =========================
// WebSocket（追加）
// =========================
let socket;
let reconnectTimer;

function connectWS(){

socket = new WebSocket("wss://api.p2pquake.net/v2/ws");

socket.onopen = () => {
document.getElementById("status").innerText = "WebSocket接続中";
};

socket.onmessage = async (e) => {

const q = JSON.parse(e.data);
if(q.code !== 551) return;

// ===== ここから完全に元ロジック維持 =====
const eq = q.earthquake;
const h = eq.hypocenter || {};

let depth="不明";
if(h.depth===0)depth="ごく浅い";
else if(h.depth!=null)depth=h.depth+"km";

const maxRaw =
q.points.reduce((m,p)=>Math.max(m,p.scale||0),0);

const intensity = buildIntensity(q.points);

const scaleMap={10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"};

let magStr =
(typeof h.magnitude==="number") ? h.magnitude.toFixed(1) : "---";

// 津波更新制御（維持）
if(Date.now()-tsunamiTimer>10000){
await fetchTsunami();
tsunamiTimer=Date.now();
}

const text =
"【地震情報】\\n\\n"+
"■ 最大震度："+(scaleMap[maxRaw]||"---")+"\\n"+
"■ マグニチュード：M"+magStr+"\\n"+
"■ 震源地："+(h.name||"不明")+"\\n"+
"■ 深さ："+depth+"\\n"+
formatTimeBlock("発生時刻",eq.time)+"\\n"+
formatTimeBlock("配信時刻",new Date())+"\\n\\n"+
"■ 津波情報\\n"+
getTsunamiDisplay()+"\\n\\n"+
"■ 出典\\n・P2P地震情報API\\n・気象庁\\n"+
"--------------------\\n"+
"■ 各地の震度\\n--------------------\\n\\n"+
intensity;

// 表示
prepend(text);

// 自動コピー
if(AUTO_COPY && lastHash!==text){
lastHash=text;
navigator.clipboard.writeText(text);
}

};

socket.onclose=()=>{
document.getElementById("status").innerText="再接続中...";
reconnectTimer=setTimeout(connectWS,3000);
};

socket.onerror=()=>socket.close();

}

// =========================
// 表示追加
// =========================
function prepend(text){

const div=document.createElement("div");
div.className="card";

div.innerHTML=
"<div class='title'>リアルタイム</div>"+
"<button onclick='copyOne(this)'>コピー</button>"+
"<textarea readonly></textarea>";

div.querySelector("textarea").value=text;

document.getElementById("logs").prepend(div);
}

// =========================
// 津波（完全維持）
// =========================
async function fetchTsunami(){
try{
const res=await fetch("https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml");
const xml=new DOMParser().parseFromString(await res.text(),"text/xml");
const entries=xml.getElementsByTagName("entry");

let found=null;
const priority=["大津波警報","津波警報","津波注意報","津波予報"];

for(const p of priority){
for(let i=0;i<entries.length;i++){
const t=entries[i].getElementsByTagName("title")[0]?.textContent||"";
const s=entries[i].getElementsByTagName("summary")[0]?.textContent||"";
if((t+s).includes(p)){found=p;break;}
}
if(found)break;
}

tsunamiText=
found==="大津波警報"?"〈⚠ 大津波警報〉"
:found==="津波警報"?"〈⚠ 津波警報〉"
:found==="津波注意報"?"〈津波注意報〉"
:found==="津波予報"?"〈津波予報〉"
:"津波なし";

}catch(e){
tsunamiText="取得失敗";
}
}

function setTsunami(m){tsunamiMode=m;}

function getTsunamiDisplay(){
if(tsunamiMode==="none")return"なし";
if(tsunamiMode==="forecast")return"津波予報";
if(tsunamiMode==="advisory")return"津波注意報";
if(tsunamiMode==="warning")return"津波警報";
if(tsunamiMode==="major")return"大津波警報";
return tsunamiText;
}

// =========================
// 震度解析（完全維持）
// =========================
function normalizeCityName(raw){
if(!raw)return"不明";
raw=raw.replace(/[０-９Ａ-Ｚａ-ｚ]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248));
raw=raw.replace(/\s+/g,"");
raw=raw.replace(/（.*?）/g,"");
raw=raw.replace(/[-ー－]+$/g,"");

const specialCities=[
"田村市","市川市","市原市","野々市市","四日市市","町田市","十日町市",
"大町市","山村市","村山市","東村山市","武蔵村山市","羽村市","大村市",
"余市町","市貝町","上市町","市川三郷町","市川町","下市町",
"大町町","村田町","玉村町","中村区"
];
if(specialCities.includes(raw))return raw;

const posCity=raw.indexOf("市");
if(posCity>0)return raw.substring(0,posCity+1);

const chars=["区","町","村"];
let cut=-1;
for(const c of chars){
const p=raw.indexOf(c);
if(p>0&&(cut===-1||p<cut))cut=p;
}

if(cut>0)return raw.substring(0,cut+1);
return raw;
}

function normalizePref(pref){
if(!pref)return"不明";
pref=pref.replace(/\s+/g,"");
if(pref==="東京")return"東京都";
if(pref==="大阪")return"大阪府";
if(pref==="京都")return"京都府";
if(!/都|道|府|県$/.test(pref))return pref+"県";
return pref;
}

function buildIntensity(points){

const cityMax={};

points.forEach(p=>{
const pref=normalizePref(p.pref||p.area||"不明");
const city=normalizeCityName(p.city||p.addr||p.station||"不明");
const scale=p.scale;

const key=pref+":"+city;
if(!cityMax[key]||cityMax[key]<scale){
cityMax[key]=scale;
}
});

const grouped={};

Object.entries(cityMax).forEach(([k,v])=>{
const [pref,city]=k.split(":");
if(!grouped[v])grouped[v]={};
if(!grouped[v][pref])grouped[v][pref]=[];
grouped[v][pref].push(city);
});

const ORDER=[70,60,55,50,45,40,30,20,10];
const map={10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"};

let out="";

ORDER.forEach(s=>{
if(!grouped[s])return;
out+="【震度"+map[s]+"】\\n━━━━━━━━━━━\\n";

Object.keys(grouped[s]).sort().forEach(pref=>{
const cities=[...new Set(grouped[s][pref])];
out+="■ "+pref+"\\n";
out+="  ・"+cities.join("、")+"\\n\\n";
});
});

return out.trimEnd();
}

// =========================
// 操作
// =========================
function enableAutoCopy(){AUTO_COPY=true;}

function copyOne(btn){
navigator.clipboard.writeText(btn.parentElement.querySelector("textarea").value);
}

function copyAll(){
let all="";
document.querySelectorAll("textarea").forEach(t=>all+=t.value+"\\n\\n");
navigator.clipboard.writeText(all);
}

function formatTimeBlock(label,date){
const d=new Date(date);
return "■ "+label+"\\n"+
d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+
d.getHours()+"時"+String(d.getMinutes()).padStart(2,"0")+"分";
}

// =========================
// 起動
// =========================
connectWS();

</script>

</body>
</html>
